<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account | Forex Academy Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root{
    --gold:#C9A84C; --dark:#0A0B0D; --dark2:#111318; --dark3:#1F242E;
    --text:#F4F5F7; --text-sec:#9CA3B0; --text-muted:#6B7280;
    --danger:#EF4444; --success:#22C55E;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);}
  .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
  .box{width:100%;max-width:440px;background:var(--dark2);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:2.5rem;}
  .logo{width:48px;height:48px;background:var(--gold);border-radius:10px;display:flex;align-items:center;justify-content:center;
        font-family:'Syne',sans-serif;font-weight:800;color:#000;font-size:1.25rem;margin:0 auto 1rem;}
  h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;text-align:center;margin:0 0 .25rem;}
  .sub{text-align:center;color:var(--text-sec);font-size:.875rem;margin:0 0 1.75rem;}
  label{display:block;font-size:.8rem;font-weight:600;margin-bottom:.375rem;color:var(--text-sec);}
  .field{margin-bottom:1rem;}
  input{width:100%;padding:.75rem .875rem;border-radius:8px;border:1px solid rgba(255,255,255,.1);
        background:var(--dark3);color:var(--text);font-size:.9rem;font-family:inherit;}
  input:focus{outline:none;border-color:var(--gold);}
  .btn{width:100%;padding:.85rem;border:none;border-radius:8px;background:var(--gold);color:#000;
       font-weight:700;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;}
  .btn:disabled{opacity:.6;cursor:not-allowed;}
  .btn:hover:not(:disabled){filter:brightness(1.05);}
  .msg{padding:.75rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1.25rem;display:none;gap:.5rem;align-items:center;}
  .msg.error{display:flex;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;}
  .msg.success{display:flex;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#86efac;}
  .foot{text-align:center;margin-top:1.5rem;font-size:.875rem;color:var(--text-muted);}
  .foot a{color:var(--gold);font-weight:600;text-decoration:none;}
  .foot a:hover{text-decoration:underline;}
  .checkrow{display:flex;gap:.6rem;align-items:flex-start;margin-bottom:1.25rem;font-size:.8rem;color:var(--text-sec);}
  .checkrow input{width:auto;margin-top:2px;accent-color:var(--gold);}
  .spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;
           animation:spin .7s linear infinite;display:none;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #debugBox{margin-top:1rem;font-size:.7rem;color:var(--text-muted);background:var(--dark3);border-radius:6px;padding:.6rem;display:none;white-space:pre-wrap;word-break:break-all;}
</style>
</head>
<body>
<div class="wrap">
  <div class="box">
    <div class="logo">F</div>
    <h1>Create your account</h1>
    <p class="sub">Start your trading journey — free</p>

    <div class="msg" id="msg"><i class="fas fa-circle-exclamation"></i><span id="msgText"></span></div>

    <form id="signupForm" novalidate>
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="name" required>
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password" required>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirm" autocomplete="new-password" required>
      </div>
      <div class="checkrow">
        <input type="checkbox" id="agree">
        <label for="agree" style="margin:0;cursor:pointer;">I agree to the Terms of Service and understand trading involves risk.</label>
      </div>
      <button type="submit" class="btn" id="submitBtn">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Create Free Account</span>
      </button>
    </form>

    <div class="foot">Already have an account? <a href="login.html">Sign in →</a></div>
    <div id="debugBox"></div>
  </div>
</div>

<script type="module">
  // ── This page is fully self-contained: Firebase config is inlined below,
  //    no imports from any other local file in your project. ──

  const debugBox = document.getElementById('debugBox');
  function debugLog(text) {
    console.log(text);
    debugBox.style.display = 'block';
    debugBox.textContent += text + '\n';
  }

  debugLog('[signup] module script starting…');

  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
    const {
      getAuth,
      createUserWithEmailAndPassword,
      updateProfile,
      onAuthStateChanged
    } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js");
    const {
      getFirestore,
      doc,
      setDoc,
      serverTimestamp
    } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");

    debugLog('[signup] Firebase SDK modules loaded OK');

    const firebaseConfig = {
      apiKey: "AIzaSyB4zLVvw6SVuFa7TxU4Ee7Ic7381K6Kz0s",
      authDomain: "swiftchain-827f2.firebaseapp.com",
      databaseURL: "https://swiftchain-827f2-default-rtdb.firebaseio.com",
      projectId: "swiftchain-827f2",
      storageBucket: "swiftchain-827f2.firebasestorage.app",
      messagingSenderId: "709059558659",
      appId: "1:709059558659:web:7c3eb1d6ddba07bb14bd36",
      measurementId: "G-5SSGXJL3DS"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    debugLog('[signup] Firebase app initialised: ' + app.options.projectId);

    const form      = document.getElementById('signupForm');
    const submitBtn = document.getElementById('submitBtn');
    const spinner   = document.getElementById('spinner');
    const btnText   = document.getElementById('btnText');
    const msg       = document.getElementById('msg');
    const msgText   = document.getElementById('msgText');

    function showMsg(text, type = 'error') {
      msg.className = 'msg ' + type;
      msgText.textContent = text;
    }
    function setLoading(on) {
      submitBtn.disabled = on;
      spinner.style.display = on ? 'inline-block' : 'none';
      btnText.textContent = on ? 'Creating account…' : 'Create Free Account';
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        debugLog('[signup] already logged in as ' + user.email + ', redirecting');
        window.location.href = '../student-portal/dashboard.html';
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      debugLog('[signup] form submitted');

      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const agreed   = document.getElementById('agree').checked;

      if (!name)               return showMsg('Please enter your full name.');
      if (!/^\S+@\S+\.\S+$/.test(email)) return showMsg('Please enter a valid email address.');
      if (password.length < 6)  return showMsg('Password must be at least 6 characters.');
      if (password !== confirm) return showMsg('Passwords do not match.');
      if (!agreed)              return showMsg('Please agree to the Terms of Service.');

      setLoading(true);

      try {
        debugLog('[signup] calling createUserWithEmailAndPassword…');
        const { user } = await createUserWithEmailAndPassword(auth, email, password);
        debugLog('[signup] Auth user created: ' + user.uid);

        await updateProfile(user, { displayName: name });
        debugLog('[signup] display name set');

        await setDoc(doc(db, 'users', user.uid), {
          uid: user.uid,
          role: 'student',
          plan: 'Starter',
          displayName: name,
          email: email,
          bio: '',
          createdAt: serverTimestamp(),
          lastLogin: serverTimestamp(),
          stats: { coursesEnrolled: 0, lessonsCompleted: 0, certificatesEarned: 0, dayStreak: 0 },
          courses: [],
          recentActivity: [],
          upcomingSessions: [],
          notifications: [],
          isActive: true
        }, { merge: true });
        debugLog('[signup] Firestore profile written');

        showMsg('Account created! Redirecting…', 'success');
        setTimeout(() => {
          window.location.href = '../student-portal/dashboard.html';
        }, 900);

      } catch (err) {
        debugLog('[signup] ERROR: ' + err.code + ' — ' + err.message);
        setLoading(false);
        const msgs = {
          'auth/email-already-in-use': 'An account with this email already exists. Try signing in.',
          'auth/invalid-email':        'Please enter a valid email address.',
          'auth/weak-password':        'Password must be at least 6 characters.',
          'auth/network-request-failed': 'Network error. Check your connection and try again.',
          'auth/operation-not-allowed': 'Email/Password sign-in is not enabled for this project in Firebase Console.',
        };
        showMsg(msgs[err.code] || `Account creation failed: ${err.message}`);
      }
    });

  } catch (fatalErr) {
    debugLog('[signup] FATAL — Firebase SDK failed to load: ' + fatalErr.message);
    showTopMsg('Could not load Firebase. Check your internet connection and console for details.');
  }

  function showTopMsg(text) {
    const msg = document.getElementById('msg');
    const msgText = document.getElementById('msgText');
    msg.className = 'msg error';
    msgText.textContent = text;
  }
</script>
</body>
</html>
